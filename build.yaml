---
include:
  # Standard split (left as central)
  - board: xiao_ble//zmk
    shield: forager_left rgbled_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_SPLIT_BLE_SUBRATING=y -DCONFIG_ZMK_IDLE_TIMEOUT=10000 -DCONFIG_ZMK_SPLIT_BLE_SUBRATE_DORMANT_DELAY=10000 -DCONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
  - board: xiao_ble//zmk
    shield: forager_right rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT_BLE_SUBRATING=y

  # Dongle mode (dongle as central)
  - board: xiao_ble//zmk
    shield: forager_dongle
    snippet: studio-rpc-usb-uart
    artifact-name: forager_dongle-xiao_ble
  - board: xiao_ble//zmk
    shield: forager_left rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n  # set left to peripheral
    artifact-name: forager_left-xiao_ble-dongle
  - board: xiao_ble//zmk
    shield: forager_right rgbled_adapter
    artifact-name: forager_right-xiao_ble-dongle

  # Utility
  - board: xiao_ble//zmk
    shield: settings_reset
